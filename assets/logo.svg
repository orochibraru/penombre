<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
    <defs>
        <!-- Modern gradient with depth -->
        <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366F1" />
            <stop offset="50%" stop-color="#4F46E5" />
            <stop offset="100%" stop-color="#4338CA" />
        </linearGradient>
        <!-- Subtle highlight gradient -->
        <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
        </linearGradient>
        <!-- Arrow accent gradient -->
        <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#A5B4FC" />
            <stop offset="100%" stop-color="#818CF8" />
        </linearGradient>
        <!-- Shadow filter -->
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4338CA" flood-opacity="0.3" />
        </filter>
    </defs>

    <!-- Main cloud shape - clean and balanced -->
    <g filter="url(#softShadow)">
        <path
            d="M158 108c0-19.882-16.118-36-36-36-3.954 0-7.756.638-11.316 1.816C104.88 58.458 89.766 48 72 48c-24.301 0-44 19.699-44 44 0 1.362.062 2.71.183 4.04C14.99 100.524 6 112.632 6 127c0 18.778 15.222 34 34 34h84c18.778 0 34-15.222 34-34 0-7.234-2.26-13.942-6.114-19.462C156.432 105.076 158 102.2 158 108z"
            fill="url(#cloudGradient)" />
        <!-- Highlight overlay -->
        <path
            d="M158 108c0-19.882-16.118-36-36-36-3.954 0-7.756.638-11.316 1.816C104.88 58.458 89.766 48 72 48c-24.301 0-44 19.699-44 44 0 1.362.062 2.71.183 4.04C14.99 100.524 6 112.632 6 127c0 18.778 15.222 34 34 34h84c18.778 0 34-15.222 34-34 0-7.234-2.26-13.942-6.114-19.462C156.432 105.076 158 102.2 158 108z"
            fill="url(#highlightGradient)" />
    </g>

    <!-- Upload arrow - modern and centered -->
    <g transform="translate(82, 105)">
        <!-- Arrow shaft -->
        <rect x="-6" y="-8" width="12" height="36" rx="6" fill="white" opacity="0.95" />
        <!-- Arrow head -->
        <path d="M0 -28 L18 -2 L10 -2 L10 -2 L-10 -2 L-18 -2 Z" fill="white" opacity="0.95" />
        <!-- Subtle inner glow on arrow -->
        <rect x="-4" y="-6" width="8" height="32" rx="4" fill="url(#arrowGradient)" opacity="0.3" />
    </g>

    <!-- Base line for upload context -->
    <rect x="52" y="138" width="60" height="6" rx="3" fill="white" opacity="0.6" />
</svg>
