services:
  db:
    image: bitnami/postgresql:17
    restart: unless-stopped
    networks:
      - gitea_opendrive_tests
    ports:
      - 5434:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD-postgres}
      - POSTGRES_DB=${POSTGRES_DB-opendrive}
    healthcheck:
      test:
        ['CMD-SHELL', "sh -c 'pg_isready -U ${POSTGRES_USER-postgres} -d ${POSTGRES_DB-opendrive}'"]
      interval: 3s
      timeout: 10s
      retries: 5
      start_period: 3s

  minio:
    image: bitnami/minio:latest
    restart: unless-stopped
    networks:
      - gitea_opendrive_tests
    environment:
      - MINIO_ROOT_USER=opendrive
      - MINIO_ROOT_PASSWORD=opendrive
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://0.0.0.0:9000/minio/health/live']
      retries: 5
      timeout: 3s
      interval: 10s
      start_period: 2s
    ports:
      - 9045:9000

networks:
  gitea_opendrive_tests:
    driver: bridge
