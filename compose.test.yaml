services:
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test-runner
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
    command: ["bun", "test", ".test.", "--only-failures"]

  redis:
    image: redis:8-alpine
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 1s
      timeout: 2s
      retries: 10
