services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    depends_on:
      minio:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - 3000:3000
    extra_hosts:
      - host.docker.internal:host-gateway
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/v1/ping']
      retries: 5
      timeout: 3s
      interval: 10s
      start_period: 2s
    environment:
      - LOG_LEVEL=${LOG_LEVEL-debug}
      - DATABASE_URL=postgres://${POSTGRES_USER-postgres}:${POSTGRES_PASSWORD-postgres}@db:5432/${POSTGRES_DB-opendrive}
      - ORIGIN=http://localhost:3000
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - MINIO_URL=http://minio:9000

  minio:
    image: bitnami/minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=opendrive
      - MINIO_ROOT_PASSWORD=opendrive
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://0.0.0.0:9000/minio/health/live']
      retries: 5
      timeout: 3s
      interval: 10s
      start_period: 2s
    ports:
      - 9000
    volumes:
      - minio_data:/bitnami/minio/data

  db:
    image: postgres
    restart: unless-stopped
    ports:
      - 5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD-postgres}
      - POSTGRES_DB=${POSTGRES_DB-opendrive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', "sh -c 'pg_isready -U ${POSTGRES_USER-postgres} -d ${POSTGRES_DB-opendrive}'"]
      interval: 3s
      timeout: 10s
      retries: 5
      start_period: 3s

  redis:
    image: bitnami/redis:latest
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    restart: unless-stopped
    ulimits:
      memlock: -1

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
