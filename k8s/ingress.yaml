apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opendrive-ingress
  namespace: opendrive
  annotations:
    # Traefik annotations for K3s
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Uncomment and configure if you want automatic SSL certificates
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  # Uncomment if using cert-manager for SSL
  # tls:
  # - hosts:
  #   - your-domain.com
  #   secretName: opendrive-tls
  rules:
    - host: your-domain.com # Replace with your actual domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opendrive-app
                port:
                  number: 8080
