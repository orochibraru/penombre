[test]
preload = ["./packages/web/test.setup.ts"]
coverage = true
coveragePathIgnorePatterns = [
    "**/setup.ts",
    "**/test.setup.ts",
    "**/*.spec.ts",
    "**/test-utils.ts",
    "**/mocks/**",
    "**/types/**",
    "**/schema.ts",
    "**/*.test.ts",
    "**/*.e2e.ts",
    "*.config.js",
    "*.config.ts",
    "dist/**",
    "build/**",
    ".next/**",
    "generated/**",
    "vendor/**",
    "src/utils/constants.ts",
    "src/types/**",
]

# Note: Bun does not support pathIgnorePatterns — use `bun test '.test.'` to
# exclude *.spec.ts (Playwright) files from unit-test runs.

[test.coverageThreshold]
line = 0.7
function = 0.8
statement = 0.9

[run]
bun = true

[install]
linker = "isolated"

[install.lockfile]
save = true

[runtime]
telemetry = false

[console]
depth = 3
