---
# GitLab CI Configuration for OpenDrive
# Converted from GitHub Actions workflows

variables:
  TZ: Europe/Paris
  PNPM_VERSION: "10"
  NODE_VERSION: "24"
  GO_VERSION: "1.25.2"
  GOLANGCI_LINT_VERSION: "v2.5.0"
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/opendrive?sslmode=disable
  STORAGE_URL: http://minio:9000
  STORAGE_ACCESS_KEY_ID: opendrive
  STORAGE_ACCESS_KEY_SECRET: opendrive
  OAUTH_PROVIDERS: "pocketid"
  # These should be set in GitLab CI/CD variables (Settings > CI/CD > Variables)
  # OAUTH_POCKETID_CLIENT_ID
  # OAUTH_POCKETID_CLIENT_SECRET
  OAUTH_POCKETID_DISCOVERY_URL: https://auth.ombrage.space/.well-known/openid-configuration

# Define stages
stages:
  - validate
  - test
  - build

# Default configuration
default:
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# Workflow rules - when to run pipelines
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# ============================================================================
# Validation Stage
# ============================================================================

validate:docker:
  stage: validate
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker compose -f compose.yaml config --quiet
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - compose.yaml
        - docker-bake.hcl
        - Dockerfile
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ============================================================================
# Test Stage - Go
# ============================================================================

test:go:build:
  stage: test
  image: golang:${GO_VERSION}
  cache:
    key:
      files:
        - packages/api/go.sum
      prefix: go
    paths:
      - packages/api/.go-cache
  before_script:
    - cd packages/api
    - export GOPATH=$CI_PROJECT_DIR/packages/api/.go-cache
    - go mod download
  script:
    - go build -v ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - packages/api/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:go:test:
  stage: test
  image: golang:${GO_VERSION}
  cache:
    key:
      files:
        - packages/api/go.sum
      prefix: go
    paths:
      - packages/api/.go-cache
  before_script:
    - cd packages/api
    - export GOPATH=$CI_PROJECT_DIR/packages/api/.go-cache
    - go mod download
  script:
    - go test -v -race ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - packages/api/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:go:lint:
  stage: test
  image: golangci/golangci-lint:${GOLANGCI_LINT_VERSION}
  cache:
    key:
      files:
        - packages/api/go.sum
      prefix: go
    paths:
      - packages/api/.go-cache
  script:
    - cd packages/api
    - golangci-lint run -v
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - packages/api/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ============================================================================
# Test Stage - Docs
# ============================================================================

.test:docs:template:
  stage: test
  image: node:${NODE_VERSION}
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: pnpm
    paths:
      - .pnpm-store
      - node_modules
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile --ignore-scripts --prefer-offline
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - packages/docs/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:docs:build:
  extends: .test:docs:template
  script:
    - cd packages/docs
    - pnpm run build
  artifacts:
    paths:
      - packages/docs/dist
    expire_in: 1 hour

test:docs:quality:
  extends: .test:docs:template
  needs:
    - test:docs:build
  parallel:
    matrix:
      - TASK: [check, lint, circular, format:check]
  script:
    - cd packages/docs
    - |
      if [ "$TASK" = "check" ]; then
        pnpm run build
      fi
    - pnpm run $TASK

# ============================================================================
# Test Stage - UI
# ============================================================================

.test:ui:template:
  stage: test
  image: node:${NODE_VERSION}
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: pnpm
    paths:
      - .pnpm-store
      - node_modules
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile --ignore-scripts --prefer-offline
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - packages/ui/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:ui:build:
  extends: .test:ui:template
  script:
    - cd packages/ui
    - pnpm run build
  artifacts:
    paths:
      - packages/ui/dist
    expire_in: 1 hour

test:ui:quality:
  extends: .test:ui:template
  needs:
    - test:ui:build
  parallel:
    matrix:
      - TASK: [check, lint, circular, format:check]
  script:
    - cd packages/ui
    - pnpm run $TASK

# ============================================================================
# Test Stage - E2E Tests
# ============================================================================

test:e2e:
  stage: test
  image: node:${NODE_VERSION}
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: pnpm
    paths:
      - .pnpm-store
      - node_modules
  services:
    - name: postgres:17
      alias: postgres
      variables:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: opendrive
    - name: minio/minio:latest
      alias: minio
      command: ["server", "/data"]
      variables:
        MINIO_ROOT_USER: $STORAGE_ACCESS_KEY_ID
        MINIO_ROOT_PASSWORD: $STORAGE_ACCESS_KEY_SECRET
  variables:
    OAUTH_POCKETID_REDIRECT_URL: https://pr-${CI_MERGE_REQUEST_IID}-drive.ombrage.space/api/v1/auth/oauth/pocketid/callback
  before_script:
    # Setup pnpm
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm config set store-dir .pnpm-store
    # Install Go
    - apt-get update && apt-get install -y wget
    - wget -q https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz
    - tar -C /usr/local -xzf go${GO_VERSION}.linux-amd64.tar.gz
    - export PATH=$PATH:/usr/local/go/bin
    - cd packages/api && go mod tidy && cd ../..
    # Install Node dependencies
    - pnpm install --frozen-lockfile --ignore-scripts --prefer-offline
    # Build frontend
    - pnpm run build
    # Install Playwright
    - npx playwright install --with-deps
  script:
    - pnpm run test
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    reports:
      junit: test-results/junit.xml
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ============================================================================
# Build Stage - Docker
# ============================================================================

build:docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - apk add --no-cache git
    # Use buildx for multi-platform builds
    - docker buildx create --use
    - docker buildx bake --file ./docker-bake.hcl --push
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
