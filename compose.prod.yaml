services:
  app:
    image: git.ombrage.space/opendrive/opendrive:${TAG-latest}
    ports:
      - 8080
    extra_hosts:
      - host.docker.internal:host-gateway
    healthcheck:
      test:
        [
          CMD,
          wget,
          --quiet,
          --timeout=3,
          --tries=1,
          --spider,
          http://0.0.0.0:8080/api/v1/healthz,
        ]
      retries: 5
      timeout: 3s
      interval: 10s
      start_period: 2s
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER-postgres}:${POSTGRES_PASSWORD-postgres}@db:5432/${POSTGRES_DB-opendrive}?sslmode=disable
      - MINIO_URL=http://minio:9000
      - ORIGIN=${URL-http://localhost:8080}
      - BODY_SIZE_LIMIT=Infinity
      - OAUTH_PROVIDERS=${OAUTH_PROVIDERS}
      - OAUTH_POCKETID_DISCOVERY_URL=${OAUTH_POCKETID_DISCOVERY_URL}
      - OAUTH_POCKETID_REDIRECT_URL=${OAUTH_POCKETID_REDIRECT_URL}
      - OAUTH_POCKETID_CLIENT_ID=${OAUTH_POCKETID_CLIENT_ID}
      - OAUTH_POCKETID_CLIENT_SECRET=${OAUTH_POCKETID_CLIENT_SECRET}
    networks:
      - proxy-swarm
      - opendrive
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.opendrive-app.rule=Host(`drive.ombrage.space`)
        - traefik.http.routers.opendrive-app.entrypoints=websecure
        - traefik.http.routers.opendrive-app.tls.certResolver=letsencrypt
        - traefik.http.services.opendrive-app.loadbalancer.server.port=8080

  minio:
    image: bitnami/minio:2025
    networks:
      - opendrive
    environment:
      - MINIO_ROOT_USER=opendrive
      - MINIO_ROOT_PASSWORD=opendrive
    healthcheck:
      test: [CMD, curl, -f, http://0.0.0.0:9000/minio/health/live]
      retries: 5
      timeout: 3s
      interval: 10s
      start_period: 2s
    ports:
      - 9000
    volumes:
      - minio_data:/bitnami/minio/data

  db:
    image: postgres:17-alpine
    networks:
      - opendrive
    ports:
      - 5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD-postgres}
      - POSTGRES_DB=${POSTGRES_DB-opendrive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          CMD-SHELL,
          "sh -c 'pg_isready -U ${POSTGRES_USER-postgres} -d ${POSTGRES_DB-opendrive}'",
        ]
      interval: 3s
      timeout: 10s
      retries: 5
      start_period: 3s

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  proxy-swarm:
    external: true
  opendrive:
    driver: overlay
