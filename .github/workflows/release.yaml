name: Release

on:
  push:
    branches:
      - main
    tags-ignore:
      - "v*.*.*"
    paths-ignore:
      - "**/*.md"
      - ".husky/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-release
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write

env:
  TZ: Europe/Paris

jobs:
  check:
    uses: ./.github/workflows/pr.yaml
    if: "!startsWith(github.event.head_commit.message, 'chore(release)')"

  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.CI_TOKEN }}
    needs: [check]
    if: "!startsWith(github.event.head_commit.message, 'chore(release)')"
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ env.GITHUB_TOKEN }}

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Configure Git
        run: |
          # User
          git config --global user.name "Release Bot"
          git config --global user.email "no-reply@ombrage.space"
          # Credentials
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.CI_TOKEN }}@github.com" > ~/.git-credentials

      - name: Create Release
        run: bunx changelogen@latest --release --hideAuthorEmail

      - name: Create Release
        run: bunx changelogen@latest gh release
