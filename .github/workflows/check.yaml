name: Check

on:
  workflow_call:
  push:

env:
  PNPM_VERSION: 10.11.0
  TZ: Europe/Paris
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/opendrive
  OAUTH_CLIENT_ID: 123
  OAUTH_CLIENT_SECRET: acb456
  BETTER_AUTH_SECRET: very_secret_secret
  BETTER_AUTH_URL: http://localhost:5173

jobs:
  node:
    name: 'Node'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Lint
        run: pnpm run lint

      - name: Verify Formatting
        run: pnpm run format:check

      - name: Look for circular dependencies
        run: pnpm run circular

      - name: Run TypeScript check
        run: pnpm run check

      - name: Build the app
        run: pnpm run build
