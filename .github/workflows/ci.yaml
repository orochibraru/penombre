name: CI/CD

on:
  push:
    tags-ignore:
      - 'v*.*.*'
    branches:
      - main
    paths:
      - "packages/web/**"
      - "scripts/**"
      - "Dockerfile"
      - "docker-bake.hcl"
      - "compose.yaml"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "biome.json"
      - ".github/workflows/**"
      - "docs/**"

  pull_request:
    paths:
      - "packages/**"
      - "scripts/**"
      - "Dockerfile"
      - "docker-bake.hcl"
      - "compose.yaml"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "biome.json"
      - ".github/workflows/**"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TZ: Europe/Paris
  BUN_VERSION: 1.3.10

jobs:
  # ===========================================
  # TypeScript: Lint, Format, Build
  # ===========================================
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: opendrive
          POSTGRES_PASSWORD: opendrive
          POSTGRES_DB: opendrive
        options: >-
          --health-cmd="pg_isready -U opendrive"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgres://opendrive:opendrive@postgres:5432/opendrive
      ORIGIN: http://localhost:3000
      LOG_LEVEL: DEBUG
      PORT: 3000
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js for tooling
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Linting
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Build
        working-directory: packages/web
        run: bunx --bun svelte-kit sync && bunx --bun vite build

      - name: Type check
        working-directory: packages/web
        run: bun run check

  docker:
    name: Docker
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.sha }}
      IMAGE: git.ombrage.space/opendrive/opendrive
    if: github.event_name == 'pull_request'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: actions/checkout@v6

      # PR: Build only (no push)
      - name: Build (PR validation)
        if: github.event_name == 'pull_request'
        shell: bash
        run: docker buildx bake --file ./docker-bake.hcl app

  release:
    name: Release
    runs-on: ubuntu-latest
    # needs: typescript
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Configure Git
        run: |
          git config --global user.name "Gitea Bot"
          git config --global user.email "no-reply@ombrage.space"

      - uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          ssh-known-hosts: 'git.ombrage.space'
          ssh-strict: "false"

      - name: Create Release
        run: bun run ./scripts/bump-version.ts

      - name: Push to git
        run: git push origin main --tags

      - name: Create Release
        run: bun run ./scripts/release.ts
