name: CI

on:
  workflow_call:
  pull_request:

permissions: read-all

env:
  PNPM_VERSION: 10.12.4
  TZ: Europe/Paris
  DATABASE_URL: postgres://postgres:postgres@db:5432/opendrive?sslmode=disable
  STORAGE_URL: http://minio:9000
  NODE_VERSION: 22
  STORAGE_ACCESS_KEY_ID: opendrive
  STORAGE_ACCESS_KEY_SECRET: opendrive
  OAUTH_PROVIDERS: "pocketid"
  OAUTH_POCKETID_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
  OAUTH_POCKETID_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
  OAUTH_POCKETID_DISCOVERY_URL: https://auth.ombrage.space/.well-known/openid-configuration
  OAUTH_POCKETID_REDIRECT_URL: https://pr-${{ github.event.number }}-drive.ombrage.space/api/v1/auth/oauth/pocketid/callback

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./packages/api
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        run: go build -v ./...

      - name: Test with Race Detector
        run: go test -v -race ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1
          working-directory: packages/api

  docker:
    runs-on: ubuntu-latest
    name: Docker
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: actions/checkout@v4

      - name: Validate Compose configurations
        shell: bash
        run: |
          docker compose -f compose.yaml config --quiet
          docker compose -f compose.local.yaml config --quiet
          docker compose -f compose.prod.yaml config --quiet

  node:
    name: Node
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./packages/ui
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts --prefer-offline

      - name: Sync routes
        run: pnpm exec kit-routes sync

      - name: Run CI tasks 🧪
        run: pnpm -w run ci:tasks

  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:17
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opendrive
      minio:
        image: git.ombrage.space/opendrive/storage:latest
        options: --health-cmd="curl -f http://0.0.0.0:9000/minio/health/live" --health-interval=10s --health-timeout=5s --health-retries=3
        credentials:
          username: salokain
          password: ${{ secrets.PACKAGES_TOKEN }}
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: ${{ env.STORAGE_ACCESS_KEY_ID }}
          MINIO_ROOT_PASSWORD: ${{ env.STORAGE_ACCESS_KEY_SECRET }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "^1.25.0"

      - name: Install Go deps
        run: go -C packages/api mod tidy

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Node deps
        run: pnpm install --frozen-lockfile --ignore-scripts --prefer-offline

      - name: Build frontend
        run: pnpm -C packages/ui run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: pnpm run test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
