name: CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "packages/**"
      - "scripts/**"
      - "Dockerfile"
      - "docker-bake.hcl"
      - "compose.yaml"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "biome.json"
      - ".github/workflows/**"
      - "docs/**"
  pull_request:
    paths:
      - "packages/**"
      - "scripts/**"
      - "Dockerfile"
      - "docker-bake.hcl"
      - "compose.yaml"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "biome.json"
      - ".github/workflows/**"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TZ: Europe/Paris

jobs:
  # ===========================================
  # TypeScript: Lint, Format, Build
  # ===========================================
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: opendrive
          POSTGRES_PASSWORD: opendrive
          POSTGRES_DB: opendrive
        options: >-
          --health-cmd="pg_isready -U opendrive"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgres://opendrive:opendrive@postgres:5432/opendrive
      ORIGIN: http://localhost:3000
      LOG_LEVEL: DEBUG
      PORT: 3000
    steps:
      - uses: actions/checkout@v5

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Node.js for tooling
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Linting
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Build
        working-directory: packages/web
        run: bunx --bun svelte-kit sync && bunx --bun vite build

      - name: Type check
        working-directory: packages/web
        run: bun run check

  release:
    name: Release
    needs: typescript
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      published: ${{ steps.release.outputs.published }}
      version: ${{ steps.release.outputs.version }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Light Release & Push
        id: release
        run: |
          # 1. Capture the current version
          OLD_VERSION=$(node -p "require('./package.json').version")

          # 2. Execute light-release
          bun run release

          # 3. Capture the new version
          NEW_VERSION=$(node -p "require('./package.json').version")

          if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "Version bumped: $OLD_VERSION -> $NEW_VERSION"
            echo "published=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

            # 4. Sync the bun lockfile since package.json was modified
            bun install

            # 5. Configure Git bot identity
            git config user.name "Gitea Actions"
            git config user.email "actions@git.ombrage.space"

            # 6. Commit the new files (CHANGELOG, HTML notes, package.json, bun.lock)
            git add .
            git commit -m "chore(release): v$NEW_VERSION [skip ci]"
            
            # 7. Create the Git tag
            git tag "v$NEW_VERSION"

            # 8. Push the commit and the tag back to the repository
            git push origin main
            git push origin "v$NEW_VERSION"
          else
            echo "No release required."
            echo "published=false" >> $GITHUB_OUTPUT
          fi

  # ===========================================
  # Docker: Build (PR) or Build & Push (main)
  # ===========================================
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name != 'pull_request' || !startsWith(github.event.pull_request.title, 'WIP')
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: actions/checkout@v5

      # Only login and push on main branch
      - name: Login to Container registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: git.ombrage.space
          username: salokain
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        if: github.ref == 'refs/heads/main' && needs.release.outputs.published == 'true'
        with:
          images: git.ombrage.space/opendrive/opendrive
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha

      - name: Build (PR)
        uses: docker/build-push-action@v6
        if: github.event_name == 'pull_request'
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ github.sha }}

      # Main: Build and push
      - name: Build and push (main)
        uses: docker/build-push-action@v6
        if: github.ref == 'refs/heads/main' && needs.release.outputs.published == 'true'
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ===========================================
  # Deploy: Only on main branch after docker
  # ===========================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    env:
      URL: https://drive.ombrage.space
      HOSTNAME: drive.ombrage.space
      REGISTRY_USER: salokain
      REGISTRY_PASSWORD: ${{ secrets.PACKAGES_TOKEN }}
      DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
      DOKPLOY_AUTH_TOKEN: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
      DOCKER_TAG: ${{ needs.release.outputs.version }}
      DOKPLOY_APP_ID: ${{ secrets.DOKPLOY_APP_ID }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Deploy to Dokploy
        shell: bash
        run: bun run ./scripts/deploy.ts
