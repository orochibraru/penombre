name: CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'scripts/**'
      - 'Dockerfile'
      - 'docker-bake.hcl'
      - 'compose.yaml'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - 'biome.json'
      - '.github/workflows/**'
      - 'docs/**'
  pull_request:
    paths:
      - 'packages/**'
      - 'scripts/**'
      - 'Dockerfile'
      - 'docker-bake.hcl'
      - 'compose.yaml'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - 'biome.json'
      - '.github/workflows/**'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TZ: Europe/Paris

jobs:
  # ===========================================
  # TypeScript: Lint, Format, Build, Test
  # ===========================================
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: opendrive
          POSTGRES_PASSWORD: opendrive
          POSTGRES_DB: opendrive
        options: >-
          --health-cmd="pg_isready -U opendrive"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgres://opendrive:opendrive@postgres:5432/opendrive
    steps:
      - uses: actions/checkout@v5

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Setup Node.js for tooling
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Linting
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Build
        working-directory: packages/web
        run: bunx --bun svelte-kit sync && bunx --bun vite build

      - name: Type check
        working-directory: packages/web
        run: bun run check

      - name: Generate SvelteKit types for tests
        working-directory: packages/web
        run: bunx --bun svelte-kit sync

      - name: Run unit/integration tests
        run: bun run test

      - name: Setup Playwright browsers
        working-directory: packages/web
        run: bunx --bun playwright install --with-deps

      - name: Run e2e tests
        working-directory: packages/web
        run: bun run test:e2e:ci
        
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ===========================================
  # Docker: Build (PR) or Build & Push (main)
  # ===========================================
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: typescript
    if: github.event_name != 'pull_request' || !startsWith(github.event.pull_request.title, 'WIP')
    env:
      IMAGE: git.ombrage.space/opendrive/opendrive
      TAG: ${{ github.sha }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: actions/checkout@v5

      # Only login and push on main branch
      - name: Login to Container registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: git.ombrage.space
          username: salokain
          password: ${{ secrets.PACKAGES_TOKEN }}

      # PR: Build only (no push)
      - name: Build (PR validation)
        if: github.event_name == 'pull_request'
        shell: bash
        run: docker buildx bake --file ./docker-bake.hcl app

      # Main: Build and push
      - name: Build and push
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: docker buildx bake --file ./docker-bake.hcl --push

  # ===========================================
  # Deploy: Only on main branch after docker
  # ===========================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    env:
      URL: https://drive.ombrage.space
      HOSTNAME: drive.ombrage.space
      REGISTRY_USER: salokain
      REGISTRY_PASSWORD: ${{ secrets.PACKAGES_TOKEN }}
      DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
      DOKPLOY_AUTH_TOKEN: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
      DOCKER_TAG: ${{ github.sha }}
      DOKPLOY_APP_ID: ${{ secrets.DOKPLOY_APP_ID }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Deploy to Dokploy
        shell: bash
        run: bun run ./scripts/deploy.ts
