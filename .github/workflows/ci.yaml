name: CI/CD

on:
  push:
    tags-ignore:
      - 'v*.*.*'
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-ci
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TZ: Europe/Paris
  BUN_VERSION: 1.3.10

jobs:
  # ===========================================
  # TypeScript: Lint, Format, Build
  # ===========================================
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: opendrive
          POSTGRES_PASSWORD: opendrive
          POSTGRES_DB: opendrive
        options: >-
          --health-cmd="pg_isready -U opendrive"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgres://opendrive:opendrive@postgres:5432/opendrive
      ORIGIN: http://localhost:3000
      LOG_LEVEL: DEBUG
      PORT: 3000
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js for tooling
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Linting
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Build
        working-directory: packages/web
        run: bunx --bun svelte-kit sync && bunx --bun vite build

      - name: Type check
        working-directory: packages/web
        run: bun run check

  docker:
    name: Docker
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.sha }}
      IMAGE: git.ombrage.space/opendrive/opendrive
    if: github.event_name == 'pull_request'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: actions/checkout@v6

      # PR: Build only (no push)
      - name: Build (PR validation)
        if: github.event_name == 'pull_request'
        shell: bash
        run: docker buildx bake --file ./docker-bake.hcl app

  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      GITEA_TOKEN: ${{ secrets.CI_TOKEN }}
    needs: typescript
    # If branch is main and its commit message doesn't start with "chore(release)", then create a release
    if: github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(release)')
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ env.GITEA_TOKEN }}

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Configure Git
        run: |
          # User
          git config --global user.name "Release Bot"
          git config --global user.email "no-reply@ombrage.space"
          # Credentials
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GITEA_TOKEN }}@git.ombrage.space" > ~/.git-credentials

      - name: Create Release
        run: bun run ./scripts/bump-version.ts

      - name: Push to git
        run: git push origin main --tags

      - name: Create Release
        run: bun run ./scripts/release.ts
