name: CI

on:
  workflow_call:
  push:
    branches-ignore:
      - main

env:
  PNPM_VERSION: 10.12.4
  TZ: Europe/Paris
  DATABASE_URL: postgres://postgres:postgres@service-db:5432/opendrive
  MINIO_URL: http://minio:9000
  OAUTH_CLIENT_ID: 123
  OAUTH_CLIENT_SECRET: acb456
  BETTER_AUTH_SECRET: very_secret_secret
  BETTER_AUTH_URL: http://0.0.0.0:5173
  NODE_VERSION: 22
  AWS_ACCESS_KEY_ID: opendrive
  AWS_SECRET_ACCESS_KEY: opendrive

jobs:
  docker:
    runs-on: ubuntu-latest
    name: 'Docker build'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: actions/checkout@v4

      - name: Validate Compose configurations
        shell: bash
        run: |
          docker compose -f compose.yaml config --quiet
          docker compose -f compose.local.yaml config --quiet
          docker compose -f compose.prod.yaml config --quiet

      - name: Build
        shell: bash
        run: docker buildx bake

  checks:
    name: 'Checks'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        job: [format:check, lint, circular, check, build]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts --prefer-offline

      - name: Run '${{ matrix.job }}' command 🧪
        run: pnpm ${{ matrix.job }}

  tests:
    name: 'Tests'
    runs-on: ubuntu-latest
    container: node:22-alpine
    services:
      # Label used to access the service container
      service-db:
        # Docker Hub image
        image: bitnami/postgresql:17
        # Provide the password for postgres
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: opendrive
        ports:
          - 5432
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd "pg_isready -U ${POSTGRES_USER-postgres} -d ${POSTGRES_DB-opendrive}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        # Docker Hub image
        image: bitnami/minio:latest
        # Provide the password for postgres
        env:
          MINIO_ROOT_USER: ${{ env.AWS_ACCESS_KEY_ID }}
          MINIO_ROOT_PASSWORD: ${{ env.AWS_SECRET_ACCESS_KEY }}
        ports:
          - 9000
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd "curl -f http://0.0.0.0:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Ping minio
        run: |
          apk add --no-cache curl
          curl -vf ${{ env.MINIO_URL }}/minio/health/live

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts --prefer-offline

      - name: Sync
        run: pnpm exec svelte-kit sync

      - name: DB Migration
        run: pnpm run db:migrate

      - name: Run tests
        run: pnpm run test:ci
