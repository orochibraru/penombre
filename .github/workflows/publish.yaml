name: Publish
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

env:
  TZ: Europe/Paris
  REGISTRY_IMAGE: orochibraru/penombre

jobs:
  build:
    uses: ./.github/workflows/docker.yaml
    with:
      publish: true
      image-name: orochibraru/penombre
    secrets:
      docker_hub_token: ${{ secrets.DOCKER_HUB_TOKEN }}
