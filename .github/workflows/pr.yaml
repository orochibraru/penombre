name: PR Validation

on:
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-ci
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TZ: Europe/Paris
  BUN_VERSION: 1.3.10

jobs:
  # ===========================================
  # TypeScript: Lint, Format, Build
  # ===========================================
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js for tooling
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Linting
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Build
        working-directory: packages/web
        run: bunx --bun svelte-kit sync && bunx --bun vite build

      - name: Type check
        working-directory: packages/web
        run: bun run check

  docker:
    name: Docker
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.sha }}
      IMAGE: orochibraru/penombre
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: actions/checkout@v6

      # PR: Build only (no push)
      - name: Build (PR validation)
        shell: bash
        run: docker buildx bake --file ./docker-bake.hcl app
