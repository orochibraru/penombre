name: Deploy

on:
  push:
    # tags:
    #   - 'v*'
    branches:
      - main

env:
  CONTEXT: homelab
  COMPOSE_FILE: ./infrastructure/compose.prod.yaml
  STACK: opendrive
  URL: https://drive.ombrage.space
  HOSTNAME: drive.ombrage.space
  IMAGE: git.ombrage.space/opendrive/opendrive
  TAG: ${{ github.sha }}
  TZ: Europe/Paris
  OAUTH_PROVIDERS: "pocketid"
  OAUTH_POCKETID_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
  OAUTH_POCKETID_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
  OAUTH_POCKETID_DISCOVERY_URL: https://auth.ombrage.space/.well-known/openid-configuration
  OAUTH_POCKETID_REDIRECT_URL: https://drive.ombrage.space/api/v1/auth/oauth/pocketid/callback
  STORAGE_ACCESS_KEY_ID: opendrive
  STORAGE_ACCESS_KEY_SECRET: opendrive
  STORAGE_URL: http://storage:9000
  DEV_PROXY: false

permissions:
  contents: write
  id-token: write

jobs:
  docker:
    runs-on: ubuntu-latest
    name: Docker build & Push
    steps:
      - name: Login to the Container registry
        uses: docker/login-action@v3
        with:
          registry: git.ombrage.space
          username: salokain
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: actions/checkout@v5

      - name: Build and push
        shell: bash
        run: docker buildx bake --file ./docker-bake.hcl --push

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    name: Deploy to Dokploy
    steps:
      - name: Deploy Application
        uses: benbristow/dokploy-deploy-action@0.0.1
        with:
          auth_token: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
          dokploy_url: ${{ secrets.DOKPLOY_URL }}
          application_id: ${{ secrets.APP_DOKPLOY_ID }}

      - name: Deploy Docs
        uses: benbristow/dokploy-deploy-action@0.0.1
        with:
          auth_token: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
          dokploy_url: ${{ secrets.DOKPLOY_URL }}
          application_id: ${{ secrets.DOCS_DOKPLOY_ID }}
