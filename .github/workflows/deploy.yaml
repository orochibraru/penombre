name: Deploy

on:
  push:
    # tags:
    #   - 'v*'
    branches:
      - main

env:
  CONTEXT: homelab
  COMPOSE_FILE: ./infrastructure/compose.prod.yaml
  STACK: opendrive
  URL: https://drive.ombrage.space
  HOSTNAME: drive.ombrage.space
  IMAGE: git.ombrage.space/opendrive/opendrive
  TAG: ${{ github.sha }}
  TZ: Europe/Paris
  OAUTH_PROVIDERS: "pocketid"
  OAUTH_POCKETID_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
  OAUTH_POCKETID_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
  OAUTH_POCKETID_DISCOVERY_URL: https://auth.ombrage.space/.well-known/openid-configuration
  OAUTH_POCKETID_REDIRECT_URL: https://drive.ombrage.space/api/v1/auth/oauth/pocketid/callback
  STORAGE_ACCESS_KEY_ID: opendrive
  STORAGE_ACCESS_KEY_SECRET: opendrive
  STORAGE_URL: http://storage:9000
  DEV_PROXY: false

permissions:
  contents: write
  id-token: write

jobs:
  docker:
    runs-on: ubuntu-latest
    name: Docker build & Push
    steps:
      - name: Login to the Container registry
        uses: docker/login-action@v3
        with:
          registry: git.ombrage.space
          username: salokain
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: actions/checkout@v5

      - name: Build and push
        shell: bash
        run: docker buildx bake --file ./docker-bake.hcl --push

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Trigger Dokploy
        shell: bash
        run: |
          response=$(curl -X 'POST' \
            "${{ secrets.DOKPLOY_URL }}/api/application.deploy" \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}" \
            -d "{\"applicationId\": \"${{ secrets.DOKPLOY_APP_ID }}\"}" \
            -w "%{http_code}" \
            -o /dev/null \
            -s)

          if [ "$response" -ne 200 ]; then
            echo "Deployment failed with status code: $response"
            exit 1
          fi
