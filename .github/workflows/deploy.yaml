name: Deploy
on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-deploy
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TZ: Europe/Paris

jobs:
  # ===========================================
  # Docker: Build (PR) or Build & Push (main)
  # ===========================================
  docker:
    name: Docker
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
      IMAGE: git.ombrage.space/opendrive/opendrive
    if: github.event_name != 'pull_request' || !startsWith(github.event.pull_request.title, 'WIP')
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: actions/checkout@v6

      # Only login and push on main branch
      - name: Login to Container registry
        uses: docker/login-action@v3
        with:
          registry: git.ombrage.space
          username: salokain
          password: ${{ secrets.PACKAGES_TOKEN }}

      # Main: Build and push
      - name: Build and push
        shell: bash
        run: docker buildx bake --file ./docker-bake.hcl --push

  # ===========================================
  # Deploy: Only on main branch after docker
  # ===========================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    env:
      URL: https://drive.ombrage.space
      HOSTNAME: drive.ombrage.space
      REGISTRY_USER: salokain
      REGISTRY_PASSWORD: ${{ secrets.PACKAGES_TOKEN }}
      DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
      DOKPLOY_AUTH_TOKEN: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
      DOCKER_TAG: ${{ github.ref_name }}
      DOKPLOY_APP_ID: ${{ secrets.DOKPLOY_APP_ID }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Deploy to Dokploy
        shell: bash
        run: bun run ./scripts/deploy.ts

