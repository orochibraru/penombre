name: Deploy

on:
  push:
    # tags:
    #   - 'v*'
    branches:
      - main

env:
  URL: https://drive.ombrage.space
  HOSTNAME: drive.ombrage.space
  IMAGE: git.ombrage.space/opendrive/opendrive
  TAG: ${{ github.sha }}
  TZ: Europe/Paris

permissions:
  contents: write
  id-token: write

jobs:
  docker:
    runs-on: ubuntu-latest
    name: Docker build & Push
    steps:
      - name: Login to the Container registry
        uses: docker/login-action@v3
        with:
          registry: git.ombrage.space
          username: salokain
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: actions/checkout@v5

      - name: Build and push
        shell: bash
        run: docker buildx bake --file ./docker-bake.hcl --push

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    name: Deploy to Dokploy
    env:
      REGISTRY_USER: salokain
      REGISTRY_PASSWORD: ${{ secrets.PACKAGES_TOKEN }}
      DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
      DOKPLOY_AUTH_TOKEN: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
      DOCKER_TAG: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Deploy
        shell: bash
        run: bun run ./scripts/deploy.ts
