name: Docker
on:
  workflow_call:
    inputs:
      publish:
        type: boolean
        default: false
      image-name:
        type: string
        default: orochibraru/penombre
    secrets:
      docker_hub_token:
        required: false
    outputs:
      image-tag:
        description: "The primary image tag that was built"
        value: ${{ jobs.merge.outputs.image-tag }}

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
      IMAGE: ${{ inputs.image-name }}
    outputs:
      matrix: ${{ steps.platforms.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create matrix
        id: platforms
        run: |
          touch .env
          docker buildx bake image-all --print
          echo "matrix=$(docker buildx bake image-all --print | jq -cr '.target."image-all".platforms')" >>${GITHUB_OUTPUT}

      - name: Show matrix
        run: |
          echo ${{ steps.platforms.outputs.matrix }}

      - name: Compute branch tag
        id: branch
        run: |
          tag="${{ github.head_ref || github.ref_name }}"
          echo "tag=$(echo "$tag" | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=raw,value=${{ steps.branch.outputs.tag }},enable=${{ github.event_name == 'pull_request' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Rename meta bake definition file
        run: |
          mv "${{ steps.meta.outputs.bake-file }}" "${{ runner.temp }}/bake-meta.json"

      - name: Upload meta bake definition
        uses: actions/upload-artifact@v7
        with:
          name: bake-meta
          path: ${{ runner.temp }}/bake-meta.json
          if-no-files-found: error
          retention-days: 1

  # ===========================================
  # Docker: Build (PR) or Build & Push (main)
  # ===========================================
  build:
    name: Docker
    runs-on: ${{ startsWith(matrix.platform, 'linux/arm') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      TAG: ${{ github.ref_name }}
      IMAGE: ${{ inputs.image-name }}
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Download meta bake definition
        uses: actions/download-artifact@v8
        with:
          name: bake-meta
          path: ${{ runner.temp }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - uses: actions/checkout@v6

      # Only login and push when publishing
      - name: Login to Container registry
        if: ${{ inputs.publish }}
        uses: docker/login-action@v4
        with:
          username: orochibraru
          password: ${{ secrets.docker_hub_token }}

      - name: Build
        id: bake
        uses: docker/bake-action@v7
        with:
          files: |
            ./docker-bake.hcl
            cwd://${{ runner.temp }}/bake-meta.json
          targets: image
          set: |
            *.tags=${{ env.IMAGE }}
            *.platform=${{ matrix.platform }}
            *.output=type=image,push-by-digest=true,name-canonical=true,push=${{ inputs.publish }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ fromJSON(steps.bake.outputs.metadata).image['containerimage.digest'] }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ===========================================
  # Merge per-platform digests into a manifest
  # ===========================================
  merge:
    name: Create Manifest & Tag
    runs-on: ubuntu-latest
    needs: [prepare, build]
    env:
      IMAGE: ${{ inputs.image-name }}
    outputs:
      image-tag: ${{ steps.inspect.outputs.tag }}
    steps:
      - name: Download meta bake definition
        uses: actions/download-artifact@v4
        with:
          name: bake-meta
          path: ${{ runner.temp }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container registry
        if: ${{ inputs.publish }}
        uses: docker/login-action@v4
        with:
          username: orochibraru
          password: ${{ secrets.docker_hub_token }}

      - name: Create manifest list and push
        if: ${{ inputs.publish }}
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.target."docker-metadata-action".tags | map("-t " + .) | join(" ")' "$RUNNER_TEMP/bake-meta.json") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        if: ${{ inputs.publish }}
        id: inspect
        run: |
          tag=$(jq -r '.target."docker-metadata-action".args.DOCKER_META_VERSION' ${{ runner.temp }}/bake-meta.json)
          echo "tag=$tag" >> $GITHUB_OUTPUT
          docker buildx imagetools inspect ${{ env.IMAGE }}:$tag
