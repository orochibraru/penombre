name: Verify / UI

on:
  workflow_call:
  pull_request:
    paths:
      - "packages/ui/**"
      - ".github/workflows/ui.yaml"

permissions:
  contents: write
  pull-requests: write # To post comments

env:
  PNPM_VERSION: 10
  TZ: Europe/Paris
  NODE_VERSION: 24

jobs:
  run-tasks:
    name: Run
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: ["build", "check", "lint", "circular", "format:check"]
    defaults:
      run:
        shell: bash
        working-directory: ./packages/ui
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts --prefer-offline

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            pnpm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-pnpm-

      - name: Build
        run: pnpm run build

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            dist
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-ui-build-${{ hashFiles('**/packages/ui/dist/**') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-ui-build-

      - name: Run ${{ matrix.task }}
        run: pnpm run ${{ matrix.task }}
