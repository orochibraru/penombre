name: Verify / Typescript

on:
  workflow_call:
  pull_request:

permissions:
  contents: write
  pull-requests: write # To post comments

env:
  TZ: Europe/Paris

jobs:
  api:
    name: Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Setup Node.js for tooling
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun ci --frozen-lockfile --ignore-scripts

      - name: Linting
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Build
        run: bun run --filter @opendrive/web build

      - name: Type check
        run: bun run --filter @opendrive/web check
