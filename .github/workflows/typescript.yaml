name: Verify / Typescript

on:
  workflow_call:
  pull_request:

permissions:
  contents: write
  pull-requests: write # To post comments

env:
  TZ: Europe/Paris

jobs:
  api:
    name: Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Setup Node.js for tooling
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun ci --frozen-lockfile --ignore-scripts

      - name: Linting
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Build @opendrive/ui
        run: bun run --filter @opendrive/ui build

      - name: Build @opendrive/api
        run: bun run --filter @opendrive/api build

      - name: API sync
        run: |
          # Run API spec generator
          bun run --filter @opendrive/ui gen:api || exit 1
          # Check for changes
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "API specs are out of date. Please run 'bun run --filter @opendrive/ui gen:api' and commit the changes."
            exit 1
          fi

      - name: Type check @opendrive/ui
        run: bun run --filter @opendrive/ui check

      - name: Type check @opendrive/api
        run: bun run --filter @opendrive/api check

      - name: Run tests
        run: bun test --ci --coverage
