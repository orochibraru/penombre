name: "📚 Documentation"
description: Report missing, incorrect, or unclear documentation.
title: "docs: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve the Penombre documentation!

  - type: dropdown
    id: doc_type
    attributes:
      label: Documentation Type
      description: What kind of documentation needs attention?
      options:
        - README
        - Code comments / JSDoc
        - Wiki / guides
        - API reference
        - Other
    validations:
      required: true

  - type: textarea
    id: location
    attributes:
      label: Location
      description: Where is the documentation issue located? (file path, URL, section…)
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
      description: Describe what is incorrect, unclear, or missing.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How should the documentation be improved?
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to make sure this has not already been reported.
          required: true
