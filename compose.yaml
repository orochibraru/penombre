services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD-postgres}
      - POSTGRES_DB=${POSTGRES_DB-opendrive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [CMD-SHELL, "sh -c 'pg_isready -U ${POSTGRES_USER-postgres} -d ${POSTGRES_DB-opendrive}'"]
      interval: 3s
      timeout: 10s
      retries: 5
      start_period: 3s

  storage:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      - MINIO_ROOT_USER=opendrive
      - MINIO_ROOT_PASSWORD=opendrive
    ports:
      - 9000:9000
    volumes:
      - storage_data:/data

volumes:
  postgres_data:
    driver: local
  storage_data:
    driver: local
