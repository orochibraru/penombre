services:
  db:
    image: postgres:17
    restart: unless-stopped
    pull_policy: always
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD-postgres}
      - POSTGRES_DB=${POSTGRES_DB-opendrive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', "sh -c 'pg_isready -U ${POSTGRES_USER-postgres} -d ${POSTGRES_DB-opendrive}'"]
      interval: 3s
      timeout: 10s
      retries: 5
      start_period: 3s

volumes:
  postgres_data:
    driver: local
