services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD-postgres}
      - POSTGRES_DB=${POSTGRES_DB-opendrive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', "sh -c 'pg_isready -U ${POSTGRES_USER-postgres} -d ${POSTGRES_DB-opendrive}'"]
      interval: 3s
      timeout: 10s
      retries: 5
      start_period: 3s

  minio:
    image: bitnami/minio:2025
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=opendrive
      - MINIO_ROOT_PASSWORD=opendrive
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://0.0.0.0:9000/minio/health/live']
      retries: 5
      timeout: 3s
      interval: 10s
      start_period: 2s
    ports:
      - 9000:9000
    volumes:
      - minio_data:/bitnami/minio/data

  redis:
    image: bitnami/redis:8.0
    restart: unless-stopped
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    ulimits:
      memlock: -1
    ports:
      - 6379:6379

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
