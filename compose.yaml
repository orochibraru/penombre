services:
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 3000:3000
    restart: unless-stopped
    environment:
      # ===========================================
      # Application
      # ===========================================
      - APP_ENV=${APP_ENV-production}
      - LOG_LEVEL=${LOG_LEVEL-info}
      - LOG_FORMAT=${LOG_FORMAT-console}
      - ORIGIN=${ORIGIN-http://localhost:3000}

      # ===========================================
      # Database
      # ===========================================
      - DATABASE_URL=postgres://postgres:postgres@db:5432/opendrive?sslmode=disable

      # ===========================================
      # Authentication
      # ===========================================
      - AUTH_SECRET=${AUTH_SECRET}
      - ENABLE_EMAIL_SIGNIN=${ENABLE_EMAIL_SIGNIN}
      - ENABLE_OAUTH_SIGNIN=${ENABLE_OAUTH_SIGNIN}
      - MIN_PASSWORD_LENGTH=${MIN_PASSWORD_LENGTH-8}

      # ===========================================
      # OAuth Provider (Default)
      # ===========================================
      - OAUTH_DEFAULT_CLIENT_ID=${OAUTH_DEFAULT_CLIENT_ID}
      - OAUTH_DEFAULT_CLIENT_SECRET=${OAUTH_DEFAULT_CLIENT_SECRET}
      - OAUTH_DEFAULT_DISCOVERY_URL=${OAUTH_DEFAULT_DISCOVERY_URL}
      - OAUTH_DEFAULT_PRETTY_NAME=${OAUTH_DEFAULT_PRETTY_NAME}

      # ===========================================
      # SMTP (Optional - for email features)
      # ===========================================
      - SMTP_ENABLED=${SMTP_ENABLED-false}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_SECURE=${SMTP_SECURE-false}
      - SMTP_FROM=${SMTP_FROM}

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD-postgres}
      - POSTGRES_DB=${POSTGRES_DB-opendrive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          CMD-SHELL,
          "sh -c 'pg_isready -U ${POSTGRES_USER-postgres} -d ${POSTGRES_DB-opendrive}'",
        ]
      interval: 1s
      timeout: 2s
      retries: 10
      start_period: 3s

volumes:
  postgres_data:
    driver: local
