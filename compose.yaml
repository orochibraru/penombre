services:
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 3000:3000
    restart: unless-stopped
    volumes:
      - storage_data:/data
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/penombre
      - LOG_LEVEL=debug
      - REDIS_URL=redis://redis:6379
      - STORAGE_BACKEND=s3
      - S3_ENDPOINT=http://garage:3900
      - S3_REGION=garage
      - S3_BUCKET=${S3_BUCKET:-penombre}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-GK000000000000000000penombre}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-00000000000000000000000000000000cafebabe00000000000000000000cafe}
      - S3_PATH_STYLE=true

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD-postgres}
      - POSTGRES_DB=${POSTGRES_DB-penombre}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          CMD-SHELL,
          "sh -c 'pg_isready -U ${POSTGRES_USER-postgres} -d ${POSTGRES_DB-penombre}'",
        ]
      interval: 1s
      timeout: 2s
      retries: 10
      start_period: 3s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 5

  garage:
    build:
      context: .
      dockerfile: docker/garage.Dockerfile
    restart: unless-stopped
    ports:
      - 3900:3900
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET:?} # GARAGE_RPC_SECRET must be set (generate with: openssl rand -hex 32)
      - S3_BUCKET=${S3_BUCKET:-penombre}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-GK000000000000000000penombre}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-00000000000000000000000000000000cafebabe00000000000000000000cafe}
    volumes:
      - garage_meta:/var/lib/garage/meta/
      - garage_data:/var/lib/garage/data/

volumes:
  postgres_data:
    driver: local
  storage_data:
    driver: local
  redis_data:
    driver: local
  garage_meta:
    driver: local
  garage_data:
    driver: local
